<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator Rezystorów</title>

<style>

body{
font-family:Arial;
background:beige;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
text-align:center;
padding:30px;
}

.resistor{
margin:20px auto;
width:260px;
height:50px;
background:#d2a679;
border-radius:25px;
display:flex;
justify-content:space-around;
align-items:center;
padding:0 20px;
}

.band{
width:14px;
height:100%;
background:black;
cursor:pointer;
}

.sliderBox{
margin-top:20px;
display:none;
}

.result{
font-size:22px;
font-weight:bold;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Kalkulator Rezystorów</h2>
<p>Kliknij pasek aby zmienić kolor</p>

<div class="resistor">
<div class="band" id="b1" onclick="selectBand(0)"></div>
<div class="band" id="b2" onclick="selectBand(1)"></div>
<div class="band" id="b3" onclick="selectBand(2)"></div>
</div>

<div class="sliderBox" id="sliderBox">
<input type="range" id="slider" min="0" max="9" value="0" oninput="changeColor()">
</div>

<div class="result" id="result">---</div>

</div>

<script>

let colors = [
{color:"black", value:0},
{color:"brown", value:1},
{color:"red", value:2},
{color:"orange", value:3},
{color:"yellow", value:4},
{color:"green", value:5},
{color:"blue", value:6},
{color:"violet", value:7},
{color:"gray", value:8},
{color:"white", value:9}
];

let multipliers = [
{color:"black", value:1},
{color:"brown", value:10},
{color:"red", value:100},
{color:"orange", value:1000},
{color:"yellow", value:10000},
{color:"green", value:100000},
{color:"blue", value:1000000}
];

let bandIndex=[1,0,0];
let activeBand=0;

function selectBand(b){

activeBand=b;

document.getElementById("sliderBox").style.display="block";

if(b<2){
document.getElementById("slider").max=9;
document.getElementById("slider").value=bandIndex[b];
}
else{
document.getElementById("slider").max=6;
document.getElementById("slider").value=bandIndex[b];
}

}

function changeColor(){

let val=document.getElementById("slider").value;

bandIndex[activeBand]=Number(val);

if(activeBand<2){
document.getElementById("b"+(activeBand+1)).style.background=
colors[val].color;
}
else{
document.getElementById("b3").style.background=
multipliers[val].color;
}

calc();

}

function calc(){

let b1=colors[bandIndex[0]].value;
let b2=colors[bandIndex[1]].value;
let m=multipliers[bandIndex[2]].value;

let value=(b1*10+b2)*m;

let text;

if(value>=1000000){
text=(value/1000000)+" MΩ";
}
else if(value>=1000){
text=(value/1000)+" kΩ";
}
else{
text=value+" Ω";
}

document.getElementById("result").innerHTML="Wartość: "+text;

}

document.getElementById("b1").style.background=colors[1].color;
document.getElementById("b2").style.background=colors[0].color;
document.getElementById("b3").style.background=multipliers[0].color;

calc();

</script>

</body>
</html>
