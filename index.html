<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator Rezystorów</title>

<style>

body{
font-family:Arial;
background:beige;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
text-align:center;
padding:30px;
}

.resistor{
margin:20px auto;
width:320px;
height:50px;
background:#d2a679;
border-radius:25px;
display:flex;
justify-content:space-around;
align-items:center;
padding:0 20px;
}

.band{
width:12px;
height:100%;
background:black;
cursor:pointer;
}

.sliderBox{
margin-top:20px;
display:none;
}

.result{
font-size:22px;
font-weight:bold;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Kalkulator Rezystorów (5 pasków)</h2>
<p>Kliknij pasek aby zmienić kolor</p>

<div class="resistor">
<div class="band" id="b1" onclick="selectBand(0)"></div>
<div class="band" id="b2" onclick="selectBand(1)"></div>
<div class="band" id="b3" onclick="selectBand(2)"></div>
<div class="band" id="b4" onclick="selectBand(3)"></div>
<div class="band" id="b5" onclick="selectBand(4)"></div>
</div>

<div class="sliderBox" id="sliderBox">
<input type="range" id="slider" min="0" max="9" value="0" oninput="changeColor()">
</div>

<div class="result" id="result">---</div>

</div>

<script>

let colors = [
{color:"black", value:0},
{color:"brown", value:1},
{color:"red", value:2},
{color:"orange", value:3},
{color:"yellow", value:4},
{color:"green", value:5},
{color:"blue", value:6},
{color:"violet", value:7},
{color:"gray", value:8},
{color:"white", value:9}
];

let multipliers = [
{color:"black", value:1},
{color:"brown", value:10},
{color:"red", value:100},
{color:"orange", value:1000},
{color:"yellow", value:10000},
{color:"green", value:100000},
{color:"blue", value:1000000}
];

let tolerance = [
{color:"brown", value:"±1%"},
{color:"red", value:"±2%"},
{color:"green", value:"±0.5%"},
{color:"blue", value:"±0.25%"},
{color:"violet", value:"±0.1%"},
{color:"gray", value:"±0.05%"},
{color:"gold", value:"±5%"},
{color:"silver", value:"±10%"}
];

let bandIndex=[1,0,0,0,6];
let activeBand=0;

function selectBand(b){

activeBand=b;
document.getElementById("sliderBox").style.display="block";

if(b<3){
document.getElementById("slider").max=9;
}
else if(b==3){
document.getElementById("slider").max=6;
}
else{
document.getElementById("slider").max=7;
}

document.getElementById("slider").value=bandIndex[b];

}

function changeColor(){

let val=document.getElementById("slider").value;
bandIndex[activeBand]=Number(val);

if(activeBand<3){
document.getElementById("b"+(activeBand+1)).style.background=
colors[val].color;
}
else if(activeBand==3){
document.getElementById("b4").style.background=
multipliers[val].color;
}
else{
document.getElementById("b5").style.background=
tolerance[val].color;
}

calc();

}

function calc(){

let b1=colors[bandIndex[0]].value;
let b2=colors[bandIndex[1]].value;
let b3=colors[bandIndex[2]].value;
let m=multipliers[bandIndex[3]].value;
let t=tolerance[bandIndex[4]].value;

let value=(b1*100+b2*10+b3)*m;

let text;

if(value>=1000000){
text=(value/1000000)+" MΩ";
}
else if(value>=1000){
text=(value/1000)+" kΩ";
}
else{
text=value+" Ω";
}

document.getElementById("result").innerHTML=
"Wartość: "+text+" "+t;

}

document.getElementById("b1").style.background=colors[1].color;
document.getElementById("b2").style.background=colors[0].color;
document.getElementById("b3").style.background=colors[0].color;
document.getElementById("b4").style.background=multipliers[0].color;
document.getElementById("b5").style.background=tolerance[6].color;

calc();

</script>

</body>
</html>
