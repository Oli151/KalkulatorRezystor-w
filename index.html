<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator Rezystorów</title>

<style>

body{
font-family: Arial;
background: beige;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
padding:35px;
width:420px;
text-align:center;
}

select{
width:80%;
padding:10px;
margin:8px;
font-size:16px;
border-radius:8px;
}

button{
background:purple;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1e3c72;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

/* REZYSTOR */

.resistor{
margin:20px auto;
width:250px;
height:40px;
background:#d2a679;
border-radius:20px;
position:relative;
display:flex;
justify-content:space-around;
align-items:center;
}

.band{
width:10px;
height:100%;
background:black;
}

</style>
</head>

<body>

<div class="container">

<h1>Kalkulator Rezystorów</h1>

<!-- REZYSTOR -->
<div class="resistor">
<div class="band" id="b1"></div>
<div class="band" id="b2"></div>
<div class="band" id="b3"></div>
</div>

<select id="band1" onchange="updateColors()">
<option value="0" data-color="black">Czarny</option>
<option value="1" data-color="brown">Brązowy</option>
<option value="2" data-color="red">Czerwony</option>
<option value="3" data-color="orange">Pomarańczowy</option>
<option value="4" data-color="yellow">Żółty</option>
<option value="5" data-color="green">Zielony</option>
<option value="6" data-color="blue">Niebieski</option>
<option value="7" data-color="violet">Fioletowy</option>
<option value="8" data-color="gray">Szary</option>
<option value="9" data-color="white">Biały</option>
</select>

<select id="band2" onchange="updateColors()">
<option value="0" data-color="black">Czarny</option>
<option value="1" data-color="brown">Brązowy</option>
<option value="2" data-color="red">Czerwony</option>
<option value="3" data-color="orange">Pomarańczowy</option>
<option value="4" data-color="yellow">Żółty</option>
<option value="5" data-color="green">Zielony</option>
<option value="6" data-color="blue">Niebieski</option>
<option value="7" data-color="violet">Fioletowy</option>
<option value="8" data-color="gray">Szary</option>
<option value="9" data-color="white">Biały</option>
</select>

<select id="multiplier" onchange="updateColors()">
<option value="1" data-color="black">Czarny ×1</option>
<option value="10" data-color="brown">Brązowy ×10</option>
<option value="100" data-color="red">Czerwony ×100</option>
<option value="1000" data-color="orange">Pomarańczowy ×1k</option>
<option value="10000" data-color="yellow">Żółty ×10k</option>
<option value="100000" data-color="green">Zielony ×100k</option>
<option value="1000000" data-color="blue">Niebieski ×1M</option>
</select>

<select id="tolerance">
<option>±1%</option>
<option>±2%</option>
<option>±5%</option>
<option>±10%</option>
</select>

<br>

<button onclick="calc()">Oblicz</button>

<div class="result" id="result">---</div>

</div>

<script>

function updateColors(){

let band1 = document.getElementById("band1");
let band2 = document.getElementById("band2");
let multiplier = document.getElementById("multiplier");

let color1 = band1.options[band1.selectedIndex].dataset.color;
let color2 = band2.options[band2.selectedIndex].dataset.color;
let color3 = multiplier.options[multiplier.selectedIndex].dataset.color;

document.getElementById("b1").style.background = color1;
document.getElementById("b2").style.background = color2;
document.getElementById("b3").style.background = color3;

}

function calc(){

let b1 = document.getElementById("band1").value;
let b2 = document.getElementById("band2").value;
let m = document.getElementById("multiplier").value;
let t = document.getElementById("tolerance").value;

let value = (b1*10 + Number(b2)) * m;

let text;

if(value>=1000000){
text=(value/1000000)+" MΩ";
}
else if(value>=1000){
text=(value/1000)+" kΩ";
}
else{
text=value+" Ω";
}

document.getElementById("result").innerHTML =
"Wartość: "+text+" "+t;

}

updateColors();

</script>

</body>
</html>
